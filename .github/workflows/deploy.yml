name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Tag image
        run: docker tag todo-app ${{ secrets.DOCKER_USERNAME }}/todo-app

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todo-app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/todo-app
            docker stop todo-app || true
            docker rm todo-app || true
            docker run -d -p 3000:3000 --name todo-app ${{ secrets.DOCKER_USERNAME }}/todo-app
